name: Build DayPlan Distribution

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install desktop packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg

      - name: Grant execute permission for scripts
        run: chmod +x gradlew scripts/build-dist.sh

      - name: Build local distribution
        run: scripts/build-dist.sh

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dayplan-dist
          path: |
            dist/android/*.apk
            dist/web/*.zip
            dist/desktop/*
            dist/manifest.txt

      - name: Create Release with distribution artifacts (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DayPlan ${{ github.ref_name }}
          files: |
            dist/android/*.apk
            dist/web/*.zip
            dist/desktop/*
            dist/manifest.txt
          generate_release_notes: true
